<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Dogma X Ciência</title>
        <script
            src="https://kit.fontawesome.com/8cfbf2d2d4.js"
            crossorigin="anonymous"
        ></script>
    </head>
    <body>
        <main>
            <h2 id="current_image">N/A</h2>
            <div class="infos_text" id="infos_text1">
                <h2>DOGMAS</h2>
                <span id="dogma_count"> 0 </span>
            </div>
            <section>
                <h1>É <strong>DOGMA</strong> ou <i>CIÊNCIA</i></h1>
                <img src="" alt="IMAGEKKJ" id="image" />
                <div class="actions_buttons">
                    <button onclick="dogmaButtonFunc()" id="dogma_button">
                        <i class="fa-regular fa-face-angry"></i>
                        É DOGMA
                    </button>
                    <button onclick="scienceButtonFunc()" id="science_button">
                        <i class="fa-regular fa-face-grin"></i>
                        É CIÊNCIA
                    </button>
                </div>
            </section>
            <div class="infos_text" id="infos_text2">
                <h2>CIÊNCIAS</h2>
                <span id="science_count"> 0 </span>
            </div>
            <section id="certificado">
                <img class="certificado-dogma" src="certificados/dogma.png" />
                <img class="certificado-science" src="certificados/science.png" alt="" />
                <div class="total_coisas">
                    <span id="total_dogmas">A</span>
                    <span id="total_sciences">A</span>
                </div>
            </section>
            <div id="confetti-container"></div>
        </main>
        <audio id="aiaiAudio" src="sounds/ai-ai-ai-tatuagem.mp3"></audio>
    </body>
    <script src="main.js"></script>
</html>
